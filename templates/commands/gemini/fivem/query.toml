description = "Query knowledge graph — BFS context retrieval from topic memories"

prompt = """
Run **graph query** against `.fivem/knowledge-graph.json` and related memories.

**Question / args:** {{args}}

Parse optional flags (case-insensitive):
- `--dfs` → depth-first trace (specific flow chain)
- `--budget N` → cap loaded memory context at N tokens (default 1500)

**Do NOT implement code** — read-only retrieval and answer.

## Step 1 — Load graph

1. Read `.fivem/knowledge-graph.json` if it exists
2. If missing → read embedded `GRAPH_DATA` from `.fivem/knowledge-graph.html` (extract `const GRAPH_DATA = ...`)
3. If neither exists → reply: run `/fivem:learn <topic>` then `/fivem:graph` first; stop

## Step 2 — Vocabulary expansion (required)

Build vocab from graph nodes only: `id`, `name`, `triggers`, `paths`, `events` (from node fields or linked memory frontmatter).
Select up to **12 tokens from this vocab** that match the question intent. Do NOT invent tokens.
Print: `Query expanded to: [token1, token2, ...]`
If empty → say no relevant vocabulary; stop.

## Step 3 — Traversal

- Default **BFS** (depth 3): broad context from best-matching learned nodes
- With `--dfs`: follow strongest link chain (event-flow > shared-resource > shared-path), depth max 6
- Link priority: `event-flow` > `shared-resource` > `shared-path` > `shared-symbol` > `cross-mention` > `domain-related`
- Start from top 1–3 nodes by token overlap score

## Step 4 — Load memories (budget-aware)

Load `memory/<topic>.md` for traversed learned nodes only. Respect `--budget`:
- Hub nodes (degree ≥ 3): full memory up to 40 lines
- BFS depth 1: Recipe + Files
- Depth 2+: frontmatter + Files only
- Stop when budget exhausted

## Step 5 — Answer

Reply in **user's language**. Cite memory paths and link types used. Quote event names/paths from memories only.
If graph lacks info → say so; suggest `/fivem:learn <topic>` or `/fivem:graph` refresh.

**Do NOT** scan full codebase beyond loaded memory files.
**Do NOT** edit any files.
"""
