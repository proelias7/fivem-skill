description = "Memory health — verify memories vs codebase, integration, token format, graph artifacts"

prompt = """
Run **memory health check** for `.gemini/fivem/memory/`.

**Args:** {{args}}

Parse (case-insensitive):
- `health` or empty → check **all** topics
- `health fix` → check all + **auto-fix** where safe
- `health <topic>` → check one topic
- `health <topic> fix` → check + fix one topic

**Do NOT edit Lua/JS** — only markdown: memories, `_index.md`, `reference.mdc` links, health report.

## Load

- `.gemini/fivem/memory-health.template.md` — report skeleton
- `.gemini/fivem/memory.template.md` — compact target format
- `.gemini/fivem/memory/_index.md`
- `.gemini/fivem/topic-catalog.md`
- `.gemini/fivem/knowledge-graph.json` — if present (graph drift)
- `reference.mdc` at project root (section `## Memórias por tópico`)
- All `.gemini/fivem/memory/*.md` except `_index.md` (or single topic if scoped)

## Verify each memory

1. **Paths** — every backtick path AND frontmatter `paths[]` must exist in repo
2. **Events/symbols** — grep quoted event names, frontmatter `events[]`, `exports[]`, `symbols[]`; flag zero matches
3. **Frontmatter** — `lang: en-compact`, `confidence` present; arrays only contain grep-confirmed literals
4. **Integration** — index rows ↔ files; reference table links ↔ existing `memory/<topic>.md`
5. **Token format** — ~25–60 lines, sections `Files`/`Recipe`/`Example`/`Pitfalls`/`Skills`, compact English
6. **Graph drift** — if `knowledge-graph.json` exists: every learned node has a memory file; memory topics missing from graph → suggest `/fivem:graph`

Verdict per topic: **OK** | **Stale** | **Broken**

## Report

Save `.gemini/fivem/memory-health.md` using template. Every finding needs evidence.

## Fix mode (when `fix` in args)

Without inventing APIs:
1. Remove/replace lines referencing missing paths/events (grep-confirmed)
2. Rewrite memory to compact English per `memory.template.md`; refresh frontmatter arrays from surviving evidence
3. Re-scan repo for that topic to fill gaps
4. Sync `_index.md` and `reference.mdc` rows
5. If mostly stale → recommend `/fivem:learn <topic>`

Reply in **user's language**: summary table, report path, auto-fixed list, re-learn list, suggest `/fivem:graph` if memories changed.
Never invent paths or APIs.
"""
