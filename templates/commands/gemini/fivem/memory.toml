description = "Memory health — verify memories vs codebase, integration, token format"

prompt = """
Run **memory health check** for `.gemini/fivem/memory/`.

**Args:** {{args}}

Parse (case-insensitive):
- `health` or empty → check **all** topics
- `health fix` → check all + **auto-fix** where safe
- `health <topic>` → check one topic
- `health <topic> fix` → check + fix one topic

**Do NOT edit Lua/JS** — only markdown: memories, `_index.md`, `reference.mdc` links, health report.

## Load

- `.gemini/fivem/memory-health.template.md` — report skeleton
- `.gemini/fivem/memory.template.md` — compact target format
- `.gemini/fivem/memory/_index.md`
- `.gemini/fivem/topic-catalog.md`
- `reference.mdc` at project root (section `## Memórias por tópico`)
- All `.gemini/fivem/memory/*.md` except `_index.md` (or single topic if scoped)

## Verify each memory

1. **Paths** — every backtick path with `/` or `.lua`/`.js`/`.tsx` must exist in repo
2. **Events/symbols** — grep quoted event names, `RegisterNetEvent`, `RegisterServerEvent`, `exports[...]`, `vRP.*`, framework calls mentioned; flag zero matches
3. **Integration** — index rows ↔ files; reference table links ↔ existing `memory/<topic>.md`
4. **Token format** — `lang: en-compact`, ~25–60 lines, sections `Files`/`Recipe`/`Example`/`Pitfalls`/`Skills`, compact English (no PT-BR narrative)

Verdict per topic: **OK** | **Stale** (partial drift) | **Broken** (critical paths/events missing)

## Report

Save `.gemini/fivem/memory-health.md` using template. Every finding needs evidence (path/symbol + grep result).

## Fix mode (when `fix` in args)

Without inventing APIs:
1. Remove or replace lines referencing missing paths/events (grep-confirmed)
2. Rewrite memory to compact English per `memory.template.md` (~25–60 lines, `lang: en-compact`)
3. Re-scan repo for that topic (catalog hints + remaining valid paths) to fill gaps
4. Sync `_index.md` and `reference.mdc` rows
5. If topic is mostly stale → prune broken content and recommend `/fivem learn <topic>` — do not guess replacements

Reply in **user's language**: summary table, report path, auto-fixed list, re-learn list.
Never invent paths or APIs.
"""
