description = "Build 3D knowledge graph from learned topic memories"

prompt = """
Build the **3D knowledge graph** HTML from `.gemini/fivem/memory/` and `topic-catalog.md`.

Run from the FiveM project root:

```bash
node .gemini/fivem/build-knowledge-graph.js --target <project-root> --agent gemini
```

Without local script:

```bash
npx --package github:proelias7/fivem-skill fivem-graph --target <project-root> --agent gemini
```

Do NOT use `npx fivem-graph` alone — not published on npm.

Output: **`.gemini/fivem/knowledge-graph.html`** — open in browser (file:// works).

Reply with counts: learned nodes (green), catalog orphans (gray), links inferred.
Suggest re-running after `/fivem:learn` sessions.

Do NOT edit memory files — only run the build script.
If `.gemini/fivem/` is missing, tell user to run fivem-skill installer first.
"""
