description = "Execute static 3D knowledge graph generator and open in browser"

prompt = """
Execute the **graph generator operation** from `.fivem/memory/` and `topic-catalog.md`, write `.fivem/knowledge-graph.json` and `.fivem/knowledge-graph.html`, and open HTML in the browser.

This is not task mode, not learn mode, and not a refactor opportunity. Do not improve graph code, tune visuals, edit templates, learn memories, create scripts, or modify project code.

**File-only mechanical mode. No Python. No Node. No Bash helper. No generated script. No HTTP server. No background process.**

### Step 1 — Read sources

- `.fivem/memory/_index.md`
- `.fivem/memory/*.md` (exclude `_index.md`)
- `.fivem/topic-catalog.md`
- `.fivem/knowledge-graph.html` (template with `/*__GRAPH_DATA__*/` placeholder)

If `.fivem/` is missing, tell user to run fivem-skill installer first.

### Step 2 — Build graph JSON

Assemble the JSON directly from the files read in Step 1. Do **not** create or execute helper code to build the JSON.

Do not scan the source codebase for extra evidence in graph mode. Links come from the existing memory files only.

**Learned nodes** (`memory/<slug>.md`): `id` (slug), `name`, `group: "learned"`, `file` (relative path), `updated`, `framework`, `triggers`, `events`, `exports`, `resources` (from frontmatter if present; else infer from content), `tokens` (~chars/4), `paths`, `searchHints: ""`.

**Catalog nodes** (topic-catalog, not yet learned): `group: "catalog"`, `file: ""`, `triggers`, `searchHints`, `tokens`, `paths`.

**Skip catalog orphan** when a learned topic already covers the same concept (canonical slug, name, triggers rules as in Cursor fivem.md).

**Links** (dedupe; learned only). Infer from code evidence, strongest first. Each link: `{ "source", "target", "type", "confidence": "extracted"|"inferred" }`.

Types: `shared-path`, `shared-resource`, `event-flow`, `shared-symbol`, `cross-mention`, `domain-related`.

**Surprising connections** (for reply only): cross-resource `event-flow`, hub nodes (degree ≥ 3), catalog orphans worth learning.

**Meta:** `generatedAt` (ISO), `agent: "shared"`, `fivemDir: ".fivem"`, `counts` (learned, catalog, links, tokens).

### Step 3 — Write JSON and HTML

1. Write full JSON to `.fivem/knowledge-graph.json` (2-space indent)
2. Replace `/*__GRAPH_DATA__*/` (or `const GRAPH_DATA = ...`) in `.fivem/knowledge-graph.html` only

Allowed writes: `.fivem/knowledge-graph.json`, `.fivem/knowledge-graph.html` only.

### Step 4 — Open browser

`start "" "<absolute-path>"` (Windows) · `open` (macOS) · `xdg-open` (Linux)

### Step 5 — Reply

Report learned / catalog orphans / links / surprising connections. Remind: `/fivem:graph` after learn; `/fivem:query` for agent retrieval.

**Do NOT** enter task mode, scan Lua/JS, edit memories, or create scripts.
"""
