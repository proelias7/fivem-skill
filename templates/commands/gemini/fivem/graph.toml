description = "Build static 3D knowledge graph and open in browser"

prompt = """
Build a **static 3D knowledge graph** from `.gemini/fivem/memory/` and `topic-catalog.md`, write `<agent>/fivem/knowledge-graph.html`, and open it in the browser.

**No Node script. No HTTP server. No background process.**

### Step 1 — Read sources

- `.gemini/fivem/memory/_index.md`
- `.gemini/fivem/memory/*.md` (exclude `_index.md`)
- `.gemini/fivem/topic-catalog.md`
- `.gemini/fivem/knowledge-graph.html` (template with `/*__GRAPH_DATA__*/` placeholder)

If `.gemini/fivem/` is missing, tell user to run fivem-skill installer first.

### Step 2 — Build graph JSON

**Learned nodes** (`memory/<slug>.md`): `id` (slug), `name`, `group: "learned"`, `file` (relative path), `updated`, `framework`, `triggers`, `tokens` (~chars/4), `paths` (backtick paths), `searchHints: ""`.

**Catalog nodes** (topic-catalog, not yet learned): `group: "catalog"`, `file: ""`, `triggers`, `searchHints`, `tokens`, `paths`.

**Links** (dedupe; learned only — catalog orphans never get links): `shared-path` (learned share path), `cross-mention` (slug in content).

**Meta:** `generatedAt` (ISO), `agent: "gemini"`, `fivemDir: ".gemini/fivem"`, `counts` (learned, catalog, links, tokens).

### Step 3 — Write HTML

Replace **only** `/*__GRAPH_DATA__*/` in `knowledge-graph.html` with the JSON (2-space indent). Write to `.gemini/fivem/knowledge-graph.html`.

### Step 4 — Open browser

`start "" "<absolute-path>"` (Windows) · `open` (macOS) · `xdg-open` (Linux)

### Step 5 — Reply

Report learned / catalog orphans / links counts. Remind user to re-run `/fivem graph` after `/fivem learn`.

**Do NOT** edit memory files — only regenerate the HTML.
**Do NOT** run Node scripts or start servers.
"""
