<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiveM — Mapa mental 3D</title>
  <style>
    :root {
      --bg: #000000;
      --panel: #09090b;
      --surface: rgba(255, 255, 255, 0.03);
      --surface-hover: rgba(255, 255, 255, 0.055);
      --border: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(255, 255, 255, 0.1);
      --text: #fafafa;
      --muted: #a1a1aa;
      --muted-2: #71717a;
      --accent: #6366F1;
      --learned: #2DD4BF;
      --catalog: #71717A;
      --link: #6366F1;
      --highlight: #A855F7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .layout {
      display: grid;
      grid-template-columns: 272px 1fr;
      height: 100vh;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 20px 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border-strong) transparent;
    }

    .sidebar-header {
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .sidebar h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .sidebar .subtitle {
      font-size: 11px;
      color: var(--muted-2);
      line-height: 1.55;
    }

    .sidebar .subtitle code {
      font-family: ui-monospace, "Cascadia Code", monospace;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .sidebar-section {
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted-2);
      margin-bottom: 10px;
    }

    input[type="search"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    input[type="search"]::placeholder {
      color: var(--muted-2);
    }

    input[type="search"]:focus {
      outline: none;
      border-color: var(--border-strong);
      background: var(--surface-hover);
    }

    .filter-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .filter-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .filter-toggle:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .filter-toggle input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    .toggle-track {
      position: relative;
      flex-shrink: 0;
      width: 30px;
      height: 17px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--muted-2);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .filter-toggle input:checked + .toggle-track {
      background: rgba(168, 85, 247, 0.18);
      border-color: rgba(168, 85, 247, 0.45);
    }

    .filter-toggle input:checked + .toggle-track .toggle-thumb {
      transform: translateX(13px);
      background: var(--catalog);
    }

    .filter-toggle input:checked ~ .filter-label,
    .filter-toggle:has(input:checked) {
      color: var(--text);
    }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
      padding: 4px 0;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.learned { background: linear-gradient(135deg, #2DD4BF, #6366F1, #A855F7); }
    .dot.catalog { background: var(--catalog); }

    .stats {
      padding: 12px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-chip {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
    }

    .stat-value {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted-2);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-footer {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted-2);
      line-height: 1.5;
    }

    .detail {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      min-height: 100px;
    }

    .detail h2 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-bottom: 10px;
      word-break: break-word;
      color: var(--text);
    }

    .detail p {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 6px;
    }

    .detail p strong {
      color: var(--muted-2);
      font-weight: 500;
    }

    .detail .badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    .badge.learned {
      background: rgba(45, 212, 191, 0.12);
      color: #5eead4;
      border: 1px solid rgba(45, 212, 191, 0.2);
    }

    .badge.catalog {
      background: rgba(168, 85, 247, 0.12);
      color: #c084fc;
      border: 1px solid rgba(168, 85, 247, 0.2);
    }

    .detail button {
      margin-top: 10px;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }

    .detail button:hover {
      border-color: var(--border-strong);
      color: var(--text);
      background: var(--surface-hover);
    }

    .empty-detail {
      font-size: 11px;
      color: var(--muted-2);
      line-height: 1.6;
    }

    .graph-stage {
      position: relative;
      min-height: 0;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }

    #graph {
      position: absolute;
      inset: 0;
    }

    #node-labels {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }

    .node-label {
      position: absolute;
      transform: translate(-50%, 12px);
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-shadow:
        0 0 6px rgba(0, 0, 0, 0.95),
        0 0 12px rgba(0, 0, 0, 0.8),
        0 1px 2px #000000;
      white-space: nowrap;
    }

    .node-label.selected {
      color: #ffffff;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.95),
        0 0 18px rgba(255, 255, 255, 0.7),
        0 0 32px rgba(255, 255, 255, 0.4),
        0 1px 2px #000000;
    }

  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <header class="sidebar-header">
        <div class="sidebar-brand">
          <h1>Graph</h1>
        </div>
        <p class="subtitle">Tópicos aprendidos via <code>/fivem learn</code></p>
      </header>

      <section class="sidebar-section">
        <input type="search" id="search" placeholder="Buscar tópico…" />
      </section>

      <section class="sidebar-section">
        <div class="section-title">Filtros</div>
        <div class="filter-list">
          <label class="filter-toggle">
            <span class="filter-label">Órfãos</span>
            <input type="checkbox" id="toggle-orphans" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
          <label class="filter-toggle">
            <span class="filter-label">Só aprendidos</span>
            <input type="checkbox" id="toggle-learned-only" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
          <label class="filter-toggle">
            <span class="filter-label">Ocultar nomes</span>
            <input type="checkbox" id="toggle-hide-names" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
      </section>

      <section class="sidebar-section">
        <div class="section-title">Grupos</div>
        <div class="legend">
          <div class="legend-item"><span class="dot learned"></span> Com ligação</div>
          <div class="legend-item"><span class="dot catalog"></span> Órfão</div>
        </div>
      </section>

      <section class="sidebar-section stats" id="stats"></section>

      <section class="detail" id="detail">
        <p class="empty-detail">Selecione um nó para ver detalhes.</p>
      </section>
    </aside>

    <div class="graph-stage">
      <div id="graph"></div>
      <div id="node-labels"></div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
  <script>
    const GRAPH_DATA = /*__GRAPH_DATA__*/;

    const GENERIC_TOPIC_TOKENS = new Set([
      "config", "script", "module", "system", "core", "main", "utils", "util",
    ]);

    function stripAccents(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function singularizeToken(token) {
      if (!token || token.length <= 3) return token;
      if (token.endsWith("oes")) return `${token.slice(0, -3)}ao`;
      if (token.endsWith("ais")) return token.slice(0, -1);
      if (token.endsWith("s") && !token.endsWith("ss")) return token.slice(0, -1);
      return token;
    }

    function canonicalTopicKey(value) {
      return stripAccents(String(value || "").toLowerCase())
        .replace(/[^a-z0-9]+/g, " ")
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .map(singularizeToken)
        .filter((token) => token && !GENERIC_TOPIC_TOKENS.has(token))
        .join(" ");
    }

    function topicTokens(value) {
      const keys = new Set();
      const canonical = canonicalTopicKey(value);
      if (canonical) keys.add(canonical);
      stripAccents(String(value || "").toLowerCase())
        .split(/[^a-z0-9]+/)
        .filter((token) => token.length >= 3 && !GENERIC_TOPIC_TOKENS.has(token))
        .forEach((token) => keys.add(singularizeToken(token)));
      return keys;
    }

    function collectTopicKeys(node) {
      const keys = new Set();
      [node.id, node.name, node.triggers, node.searchHints].forEach((field) => {
        topicTokens(field).forEach((key) => keys.add(key));
      });
      return keys;
    }

    function topicsOverlap(aKeys, bKeys) {
      for (const key of aKeys) {
        if (bKeys.has(key)) return true;
      }
      return false;
    }

    (function sanitizeGraphData() {
      const nodes = GRAPH_DATA.nodes || [];
      const learnedKeys = new Set();
      nodes
        .filter((node) => node.group === "learned")
        .forEach((node) => collectTopicKeys(node).forEach((key) => learnedKeys.add(key)));

      GRAPH_DATA.nodes = nodes.filter((node) => {
        if (node.group !== "catalog") return true;
        const catalogKeys = collectTopicKeys(node);
        return !topicsOverlap(catalogKeys, learnedKeys);
      });

      const catalogIds = new Set(
        GRAPH_DATA.nodes.filter((n) => n.group === "catalog").map((n) => n.id),
      );
      if (!GRAPH_DATA.links) GRAPH_DATA.links = [];
      GRAPH_DATA.links = GRAPH_DATA.links.filter((link) => {
        const src = link.source?.id ?? link.source;
        const tgt = link.target?.id ?? link.target;
        return !catalogIds.has(src) && !catalogIds.has(tgt) && link.type !== "catalog-hint";
      });
    })();

    const COLORS = {
      learned: "#2DD4BF",
      catalog: "#71717A",
      orphan: "#71717A",
      highlight: "#A855F7",
      dim: "#3a3a50",
      link: "#6366F1",
    };

    const VIVID_PALETTE = [
      "#60A5FA", "#22D3EE", "#A78BFA", "#F472B6",
      "#4ADE80", "#38BDF8", "#818CF8", "#C084FC",
    ];
    const NODE_LEARNED_BASE = 8;
    const NODE_CATALOG_BASE = 6;
    const NODE_LEARNED_K = 1.55;
    const NODE_CATALOG_K = 1.0;
    const htmlLabelMap = new Map();
    let cameraFitted = false;
    let orphansLaidOut = false;

    function activeNodeCount(data) {
      return data?.nodes?.length || Graph?.graphData()?.nodes?.length || GRAPH_DATA.nodes.length || 1;
    }

    function layoutSpread(data) {
      const n = activeNodeCount(data);
      return 112 + Math.sqrt(n) * 34;
    }

    function spriteDensityScale(data) {
      const n = activeNodeCount(data);
      return Math.max(0.72, Math.min(1.12, 6 / Math.sqrt(n)));
    }

    const searchInput = document.getElementById("search");
    const toggleOrphans = document.getElementById("toggle-orphans");
    const toggleLearnedOnly = document.getElementById("toggle-learned-only");
    const toggleHideNames = document.getElementById("toggle-hide-names");
    const statsEl = document.getElementById("stats");
    const detailEl = document.getElementById("detail");

    let selectedNode = null;
    let highlightNodes = new Set();
    let highlightLinks = new Set();

    function effectiveTokens(node) {
      if ((node.tokens || 0) > 0) return node.tokens;
      const hint = `${node.triggers || ""} ${node.searchHints || ""}`.trim();
      return hint ? Math.round(hint.length / 4) : 0;
    }

    function nodeSize(node) {
      const tokens = Math.max(0, effectiveTokens(node));
      const base = node.group === "learned" ? NODE_LEARNED_BASE : NODE_CATALOG_BASE;
      const scale = node.group === "learned" ? NODE_LEARNED_K : NODE_CATALOG_K;
      const max = node.group === "learned" ? 38 : 20;
      return Math.max(base, Math.min(max, base + scale * Math.sqrt(tokens)));
    }

    function paletteColor(id) {
      let hash = 0;
      for (let i = 0; i < id.length; i += 1) {
        hash = (hash << 5) - hash + id.charCodeAt(i);
      }
      return VIVID_PALETTE[Math.abs(hash) % VIVID_PALETTE.length];
    }

    function findGraphNode(nodeId) {
      return GRAPH_DATA.nodes.find((node) => node.id === nodeId);
    }

    function nodeColor(node) {
      if (selectedNode && node.id === selectedNode.id) return COLORS.highlight;
      if (highlightNodes.size && !highlightNodes.has(node.id)) return COLORS.dim;
      return nodeHasLinks(node) ? paletteColor(node.id) : COLORS.orphan;
    }

    function shouldShowLabel(node) {
      if (!toggleHideNames.checked) return true;
      return highlightNodes.has(node.id);
    }

    const circleTexture = (() => {
      const s = 128;
      const canvas = document.createElement("canvas");
      canvas.width = s;
      canvas.height = s;
      const ctx = canvas.getContext("2d");
      ctx.beginPath();
      ctx.arc(s / 2, s / 2, s / 2 - 1, 0, Math.PI * 2);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
      const tex = new THREE.CanvasTexture(canvas);
      tex.anisotropy = 4;
      return tex;
    })();

    const glowTexture = (() => {
      const s = 128;
      const canvas = document.createElement("canvas");
      canvas.width = s;
      canvas.height = s;
      const ctx = canvas.getContext("2d");
      const grd = ctx.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
      grd.addColorStop(0, "rgba(168,85,247,1)");
      grd.addColorStop(0.25, "rgba(168,85,247,0.85)");
      grd.addColorStop(0.5, "rgba(168,85,247,0.4)");
      grd.addColorStop(0.75, "rgba(168,85,247,0.12)");
      grd.addColorStop(1, "rgba(168,85,247,0)");
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, s, s);
      const tex = new THREE.CanvasTexture(canvas);
      tex.anisotropy = 4;
      return tex;
    })();

    function nodeWorldScale(node, multiplier = 1, data) {
      const graphEl = document.getElementById("graph");
      const camera = Graph.camera();
      const px = (nodeSize(node) + 4) * spriteDensityScale(data) * multiplier;

      if (!Number.isFinite(node.x) || !Number.isFinite(node.y) || !Number.isFinite(node.z)) {
        const vFov = (camera.fov * Math.PI) / 180;
        const viewHeight = graphEl?.clientHeight || window.innerHeight;
        const dist = Math.max(camera.position.length(), 120);
        const worldPerPx = (2 * Math.tan(vFov / 2) * dist) / viewHeight;
        return worldPerPx * px;
      }

      const dist = Math.max(
        camera.position.distanceTo(new THREE.Vector3(node.x, node.y, node.z)),
        1,
      );
      const vFov = (camera.fov * Math.PI) / 180;
      const viewHeight = graphEl?.clientHeight || window.innerHeight;
      const worldPerPx = (2 * Math.tan(vFov / 2) * dist) / viewHeight;
      const scale = worldPerPx * px;
      return Number.isFinite(scale) && scale > 0 ? scale : 1;
    }

    function findNodeObject(nodeId) {
      let found = null;
      Graph.scene().traverse((obj) => {
        if (found) return;
        if (obj.__graphObjType === "node" && obj.__data?.id === nodeId) {
          found = obj;
        } else if (obj.userData?.nodeId === nodeId && obj.isSprite) {
          found = obj.parent || obj;
        }
      });
      return found;
    }

    function styleNodeObject(root, node, data) {
      const isSelected = selectedNode && node.id === selectedNode.id;
      const dimmed = highlightNodes.size > 0 && !highlightNodes.has(node.id);
      const coreScale = nodeWorldScale(node, isSelected ? 1.08 : 1, data);
      const glowScale = nodeWorldScale(node, isSelected ? 2.2 : 1.65, data);

      root.traverse((obj) => {
        if (!obj.isSprite || !obj.material) return;
        if (obj.userData?.isGlow) {
          obj.material.opacity = dimmed ? 0.06 : (isSelected ? 0.78 : 0.18);
          obj.scale.set(glowScale, glowScale, 1);
          obj.material.color.set(isSelected ? COLORS.highlight : nodeColor(node));
          return;
        }
        obj.scale.set(coreScale, coreScale, 1);
        obj.material.color.set(isSelected ? COLORS.highlight : nodeColor(node));
        obj.material.opacity = 1;
      });
    }

    function syncSpritePositions() {
      Graph.graphData().nodes.forEach((node) => {
        if (!Number.isFinite(node.x)) return;
        const root = findNodeObject(node.id);
        if (root) {
          root.position.set(node.x, node.y, node.z);
        }
      });
    }

    function updateAllSprites() {
      const data = Graph.graphData();
      data.nodes.forEach((node) => {
        const root = findNodeObject(node.id);
        if (root) styleNodeObject(root, node, data);
      });
    }

    function makeNodeSprite(node) {
      const group = new THREE.Group();
      group.renderOrder = 100;
      group.userData.nodeId = node.id;

      const glow = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: glowTexture,
          transparent: true,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
          depthTest: false,
          opacity: 0,
        }),
      );
      glow.renderOrder = 90;
      glow.userData.isGlow = true;

      const core = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: circleTexture,
          transparent: true,
          opacity: 1,
          alphaTest: 0.55,
          blending: THREE.NormalBlending,
          depthWrite: false,
          depthTest: false,
        }),
      );
      core.renderOrder = 110;
      core.userData.nodeId = node.id;

      group.add(glow);
      group.add(core);
      styleNodeObject(group, node, { nodes: GRAPH_DATA.nodes });
      return group;
    }

    const LINK_TUBE_DETAIL = 6;
    const LINK_GRADIENT_PARTS = 10;
    const LINK_CURVATURE = 0.08;
    const LINK_RADIUS = 0.2;

    function linkEndpoint(end) {
      return end && end.id ? end : findGraphNode(end);
    }

    function buildLinkCurve(start, end) {
      const vs = new THREE.Vector3(start.x, start.y, start.z);
      const ve = new THREE.Vector3(end.x, end.y, end.z);
      const dir = ve.clone().sub(vs);
      const len = dir.length() || 1;
      let normal = new THREE.Vector3(0, 0, 1).cross(dir);
      if (normal.lengthSq() < 1e-6) normal = new THREE.Vector3(0, 1, 0).cross(dir);
      normal.normalize().multiplyScalar(len * LINK_CURVATURE);
      const ctrl = vs.clone().add(ve).multiplyScalar(0.5).add(normal);
      return new THREE.QuadraticBezierCurve3(vs, ctrl, ve);
    }

    function linkSegmentOpacity(tMid, highlighted, dimmed) {
      const edgeFactor = Math.abs(tMid - 0.5) * 2;
      const base = dimmed ? 0.06 : (highlighted ? 0.92 : 0.58);
      return base * (0.08 + 0.92 * Math.pow(edgeFactor, 0.55));
    }

    function styleLinkGroup(group, link) {
      const src = linkEndpoint(link.source);
      const tgt = linkEndpoint(link.target);
      const highlighted = highlightLinks.has(link);
      const dimmed = highlightLinks.size > 0 && !highlighted;
      const cStart = new THREE.Color(src ? nodeColor(src) : COLORS.link);
      const cEnd = new THREE.Color(tgt ? nodeColor(tgt) : COLORS.link);
      const parts = group.__linkParts || LINK_GRADIENT_PARTS;

      group.children.forEach((mesh, i) => {
        const tMid = (i + 0.5) / parts;
        mesh.material.color.copy(cStart).lerp(cEnd, tMid);
        mesh.material.opacity = linkSegmentOpacity(tMid, highlighted, dimmed);
      });
    }

    function makeLinkObject() {
      const group = new THREE.Group();
      group.renderOrder = 0;
      group.raycast = () => {};
      return group;
    }

    function updateLinkObject(group, { start, end }, link) {
      while (group.children.length) {
        const child = group.children[0];
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
        group.remove(child);
      }

      const curve = buildLinkCurve(start, end);
      const parts = LINK_GRADIENT_PARTS;
      group.__linkParts = parts;

      for (let i = 0; i < parts; i += 1) {
        const t0 = i / parts;
        const t1 = (i + 1) / parts;
        const subPoints = [];
        for (let j = 0; j <= LINK_TUBE_DETAIL; j += 1) {
          const t = t0 + (t1 - t0) * (j / LINK_TUBE_DETAIL);
          subPoints.push(curve.getPoint(t));
        }
        const subCurve = subPoints.length >= 2
          ? new THREE.CatmullRomCurve3(subPoints)
          : new THREE.LineCurve3(subPoints[0], subPoints[subPoints.length - 1] || subPoints[0]);
        const geometry = new THREE.TubeGeometry(subCurve, LINK_TUBE_DETAIL, LINK_RADIUS, 6, false);
        const mesh = new THREE.Mesh(
          geometry,
          new THREE.MeshBasicMaterial({
            transparent: true,
            opacity: 0.5,
            depthTest: false,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
          }),
        );
        mesh.renderOrder = 0;
        mesh.raycast = () => {};
        group.add(mesh);
      }
      styleLinkGroup(group, link);
      return true;
    }

    function syncLinkPositions() {
      Graph.graphData().links.forEach((link) => {
        const src = link.source;
        const tgt = link.target;
        if (!link.__lineObj || !Number.isFinite(src.x) || !Number.isFinite(tgt.x)) return;

        const posKey = `${src.x.toFixed(1)}|${src.y.toFixed(1)}|${src.z.toFixed(1)}|${tgt.x.toFixed(1)}|${tgt.y.toFixed(1)}|${tgt.z.toFixed(1)}`;
        if (link.__posKey === posKey) return;
        link.__posKey = posKey;

        updateLinkObject(
          link.__lineObj,
          { start: { x: src.x, y: src.y, z: src.z }, end: { x: tgt.x, y: tgt.y, z: tgt.z } },
          link,
        );
      });
    }

    function styleAllLinks() {
      Graph.graphData().links.forEach((link) => {
        if (link.__lineObj) styleLinkGroup(link.__lineObj, link);
      });
    }

    function filteredData() {
      const query = searchInput.value.trim().toLowerCase();
      const showOrphans = toggleOrphans.checked;
      const learnedOnly = toggleLearnedOnly.checked;

      let nodes = GRAPH_DATA.nodes.filter((node) => {
        if (learnedOnly && node.group !== "learned") return false;
        if (!showOrphans && node.group === "catalog") return false;
        if (query && !node.name.toLowerCase().includes(query) && !node.id.includes(query)) {
          return false;
        }
        return true;
      });

      const nodeIds = new Set(nodes.map((node) => node.id));
      const links = GRAPH_DATA.links.filter(
        (link) => nodeIds.has(link.source.id || link.source) && nodeIds.has(link.target.id || link.target),
      );

      return { nodes, links };
    }

    function formatGeneratedAt(iso) {
      if (!iso) return "";
      try {
        return new Date(iso).toLocaleString("pt-BR");
      } catch {
        return iso;
      }
    }

    function renderDetail(node) {
      if (!node) {
        detailEl.innerHTML = '<p class="empty-detail">Selecione um nó para ver detalhes.</p>';
        return;
      }

      const badgeClass = node.group === "learned" ? "learned" : "catalog";
      const badgeLabel = node.group === "learned" ? "Aprendido" : "Catálogo (órfão)";

      detailEl.innerHTML = `
        <span class="badge ${badgeClass}">${badgeLabel}</span>
        <h2>${node.name}</h2>
        ${node.tokens ? `<p><strong>Tokens:</strong> ~${node.tokens.toLocaleString("pt-BR")}</p>` : ""}
        ${node.file ? `<p><strong>Arquivo:</strong> ${node.file}</p>` : ""}
        ${node.updated ? `<p><strong>Atualizado:</strong> ${node.updated}</p>` : ""}
        ${node.framework ? `<p><strong>Framework:</strong> ${node.framework}</p>` : ""}
        ${node.triggers ? `<p><strong>Triggers:</strong> ${node.triggers}</p>` : ""}
        ${node.group === "catalog" ? `<p>Execute <code>/fivem learn ${node.id}</code> para gerar a memória.</p>` : ""}
        ${node.file ? `<button type="button" id="copy-path">Copiar path</button>` : ""}
      `;

      const copyBtn = document.getElementById("copy-path");
      if (copyBtn) {
        copyBtn.addEventListener("click", () => {
          navigator.clipboard.writeText(node.file).then(() => {
            copyBtn.textContent = "Copiado!";
            setTimeout(() => { copyBtn.textContent = "Copiar path"; }, 1200);
          });
        });
      }
    }

    function updateStats(data) {
      const learned = data.nodes.filter((n) => n.group === "learned").length;
      const catalog = data.nodes.filter((n) => n.group === "catalog").length;
      const visibleTokens = data.nodes.reduce((sum, n) => sum + (n.tokens || 0), 0);
      const totalTokens = GRAPH_DATA.meta.counts.tokens || 0;
      const generated = formatGeneratedAt(GRAPH_DATA.meta.generatedAt);
      statsEl.innerHTML = `
        <div class="stat-grid">
          <div class="stat-chip">
            <span class="stat-value">${learned}</span>
            <span class="stat-label">Aprendidos</span>
          </div>
          <div class="stat-chip">
            <span class="stat-value">${catalog}</span>
            <span class="stat-label">Órfãos</span>
          </div>
          <div class="stat-chip">
            <span class="stat-value">${data.links.length}</span>
            <span class="stat-label">Links</span>
          </div>
          <div class="stat-chip">
            <span class="stat-value">~${visibleTokens.toLocaleString("pt-BR")}</span>
            <span class="stat-label">Tokens</span>
          </div>
        </div>
        <div class="stat-footer">
          Total: ${GRAPH_DATA.meta.counts.learned} aprendidos · ${GRAPH_DATA.meta.counts.catalog} órfãos · ${GRAPH_DATA.meta.counts.links} links · ~${totalTokens.toLocaleString("pt-BR")} tokens
          ${generated ? `<br>Gerado: ${generated}` : ""}
        </div>
      `;
    }

    function pruneHtmlLabels(visibleNodes) {
      const visibleIds = new Set(visibleNodes.map((node) => node.id));
      for (const [id, el] of htmlLabelMap.entries()) {
        if (!visibleIds.has(id)) {
          el.remove();
          htmlLabelMap.delete(id);
        }
      }
    }

    function syncHtmlLabels() {
      const labelsRoot = document.getElementById("node-labels");
      const data = Graph.graphData();
      if (!labelsRoot || !data?.nodes?.length) return;

      const visibleIds = new Set();
      const dimmed = highlightNodes.size > 0;

      data.nodes.forEach((node) => {
        if (!Number.isFinite(node.x) || !Number.isFinite(node.y) || !Number.isFinite(node.z)) return;
        visibleIds.add(node.id);

        let el = htmlLabelMap.get(node.id);
        if (!el) {
          el = document.createElement("div");
          el.className = "node-label";
          labelsRoot.appendChild(el);
          htmlLabelMap.set(node.id, el);
        }

        el.textContent = node.name;
        const isSelected = selectedNode && node.id === selectedNode.id;
        el.classList.toggle("selected", isSelected);
        el.style.opacity = dimmed && !highlightNodes.has(node.id) ? "0.35" : "1";

        const coords = Graph.graph2ScreenCoords(node.x, node.y, node.z);
        if (!coords || !shouldShowLabel(node)) {
          el.style.display = "none";
          return;
        }

        el.style.display = "block";
        el.style.left = `${coords.x}px`;
        el.style.top = `${coords.y}px`;
      });

      for (const [id, el] of htmlLabelMap.entries()) {
        if (!visibleIds.has(id)) {
          el.style.display = "none";
        }
      }
    }

    function nodeId(value) {
      return value?.id || value;
    }

    function nodeHasLinks(node) {
      return GRAPH_DATA.links.some((link) => (
        nodeId(link.source) === node.id || nodeId(link.target) === node.id
      ));
    }

    function nodeDegreeMap(links) {
      const degrees = new Map();
      links.forEach((link) => {
        const sourceId = nodeId(link.source);
        const targetId = nodeId(link.target);
        degrees.set(sourceId, (degrees.get(sourceId) || 0) + 1);
        degrees.set(targetId, (degrees.get(targetId) || 0) + 1);
      });
      return degrees;
    }

    function seedMindMapPositions(nodes, links) {
      const spread = layoutSpread({ nodes });
      const degrees = nodeDegreeMap(links);
      const connected = nodes
        .filter((node) => degrees.has(node.id))
        .sort((a, b) => (degrees.get(b.id) || 0) - (degrees.get(a.id) || 0));
      const orphans = nodes
        .filter((node) => !degrees.has(node.id))
        .sort((a, b) => a.name.localeCompare(b.name));

      const golden = Math.PI * (3 - Math.sqrt(5));

      function placeSphere(cloudNodes, radius, startIndex = 1, looseness = 1) {
        const total = cloudNodes.length + startIndex;
        cloudNodes.forEach((node, index) => {
          const order = index + startIndex;
          const t = (order + 0.5) / total;
          const phi = Math.acos(Math.max(-1, Math.min(1, 1 - 2 * t)));
          const theta = golden * order;
          const r = radius * Math.pow(order, 0.42) * looseness;
          node.x = r * Math.sin(phi) * Math.cos(theta);
          node.y = r * Math.sin(phi) * Math.sin(theta);
          node.z = r * Math.cos(phi);
        });
      }

      const center = connected[0] || nodes[0];
      if (center) {
        center.x = 0;
        center.y = 0;
        center.z = 0;
      }

      placeSphere(connected.filter((node) => node !== center), spread * 0.42, 1, 1);
      placeSphere(orphans, spread * 0.78, connected.length + 2, 1.35);
    }

    function seedOrphanPositions(nodes, links) {
      const linkedIds = new Set();
      links.forEach((link) => {
        linkedIds.add(nodeId(link.source));
        linkedIds.add(nodeId(link.target));
      });

      const orphans = nodes.filter((n) => !linkedIds.has(n.id));
      const shell = layoutSpread({ nodes }) * 1.65;
      const golden = Math.PI * (3 - Math.sqrt(5));
      orphans.forEach((orphan, i) => {
        const t = (i + 0.5) / orphans.length;
        const phi = Math.acos(Math.max(-1, Math.min(1, 1 - 2 * t)));
        const theta = golden * (i + 1);
        orphan.x = shell * Math.sin(phi) * Math.cos(theta);
        orphan.y = shell * Math.sin(phi) * Math.sin(theta);
        orphan.z = shell * Math.cos(phi);
      });
    }

    function fitCamera() {
      if (cameraFitted) return;
      const data = Graph.graphData();
      const positioned = data?.nodes?.filter((node) => Number.isFinite(node.x));
      if (!positioned?.length) return;

      let minX = Infinity;
      let maxX = -Infinity;
      let minY = Infinity;
      let maxY = -Infinity;
      let minZ = Infinity;
      let maxZ = -Infinity;
      positioned.forEach((node) => {
        minX = Math.min(minX, node.x);
        maxX = Math.max(maxX, node.x);
        minY = Math.min(minY, node.y);
        maxY = Math.max(maxY, node.y);
        minZ = Math.min(minZ, node.z);
        maxZ = Math.max(maxZ, node.z);
      });

      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      const cz = (minZ + maxZ) / 2;
      const boundsSpan = Math.max(maxX - minX, maxY - minY, maxZ - minZ, 1);
      const span = boundsSpan + Math.max(boundsSpan * 0.35, layoutSpread(data) * 0.25, 24);
      const dist = span * 0.86;

      const camera = Graph.camera();
      const controls = Graph.controls();
      camera.position.set(cx + dist * 0.52, cy + span * 0.34, cz + dist);
      camera.lookAt(cx, cy, cz);
      controls.target.set(cx, cy, cz);
      controls.update();
      cameraFitted = true;
    }

    function layoutOrphansNearCluster() {
      const data = Graph.graphData();
      if (!data?.nodes?.length) return;
      const spread = layoutSpread(data);

      const linkedIds = new Set();
      data.links.forEach((link) => {
        linkedIds.add(nodeId(link.source));
        linkedIds.add(nodeId(link.target));
      });

      const connected = data.nodes.filter((n) => linkedIds.has(n.id) && Number.isFinite(n.x));
      const orphans = data.nodes.filter((n) => !linkedIds.has(n.id));
      if (!connected.length || !orphans.length) return;

      let cx = 0;
      let cy = 0;
      let cz = 0;
      connected.forEach((n) => {
        cx += n.x;
        cy += n.y;
        cz += n.z;
      });
      cx /= connected.length;
      cy /= connected.length;
      cz /= connected.length;

      let clusterRadius = 0;
      connected.forEach((n) => {
        const dx = n.x - cx;
        const dy = n.y - cy;
        const dz = n.z - cz;
        clusterRadius = Math.max(clusterRadius, Math.sqrt(dx * dx + dy * dy + dz * dz));
      });

      const innerShell = clusterRadius + spread * 0.85;
      const outerShell = clusterRadius + spread * 1.35;
      const golden = Math.PI * (3 - Math.sqrt(5));

      orphans.forEach((orphan, i) => {
        const shell = i % 2 === 0 ? innerShell : outerShell;
        const t = (i + 0.5) / orphans.length;
        const phi = Math.acos(Math.max(-1, Math.min(1, 1 - 2 * t)));
        const theta = golden * (i + 1);
        orphan.x = cx + shell * Math.sin(phi) * Math.cos(theta);
        orphan.y = cy + shell * Math.sin(phi) * Math.sin(theta);
        orphan.z = cz + shell * Math.cos(phi);
      });
    }

    function finalizeLayout() {
      if (orphansLaidOut) return;
      const data = Graph.graphData();
      if (!data?.nodes?.some((node) => Number.isFinite(node.x))) return;
      layoutOrphansNearCluster();
      orphansLaidOut = true;
      cameraFitted = false;
      fitCamera();
      repaintGraph();
    }

    function repaintGraph() {
      Graph.graphData().links.forEach((link) => {
        link.__posKey = null;
      });
      updateAllSprites();
      syncLinkPositions();
      styleAllLinks();
      syncHtmlLabels();
    }

    function activateNode(node) {
      selectedNode = node;
      highlightNodes = new Set([node.id]);
      highlightLinks = new Set();

      GRAPH_DATA.links.forEach((link) => {
        const sourceId = nodeId(link.source);
        const targetId = nodeId(link.target);
        if (sourceId === node.id || targetId === node.id) {
          highlightNodes.add(sourceId);
          highlightNodes.add(targetId);
          highlightLinks.add(link);
        }
      });

      renderDetail(node);
      repaintGraph();
    }

    function clearSelection() {
      selectedNode = null;
      highlightNodes = new Set();
      highlightLinks = new Set();
      renderDetail(null);
      repaintGraph();
    }

    function pickNodeAt(clientX, clientY) {
      const canvas = Graph.renderer().domElement;
      const rect = canvas.getBoundingClientRect();
      const localX = clientX - rect.left;
      const localY = clientY - rect.top;

      let best = null;
      let bestDist = Infinity;

      Graph.graphData().nodes.forEach((node) => {
        if (!Number.isFinite(node.x) || !Number.isFinite(node.y) || !Number.isFinite(node.z)) {
          return;
        }

        const projected = new THREE.Vector3(node.x, node.y, node.z).project(Graph.camera());
        if (projected.z > 1) return;

        const sx = (projected.x * 0.5 + 0.5) * rect.width;
        const sy = (-projected.y * 0.5 + 0.5) * rect.height;
        const dist = Math.hypot(localX - sx, localY - sy);
        const hitRadius = Math.max(
          (nodeSize(node) + 30) * spriteDensityScale(Graph.graphData()) * 3.2,
          60,
        );

        if (dist <= hitRadius && dist < bestDist) {
          bestDist = dist;
          best = node;
        }
      });

      return best;
    }

    function wireGraphSelection() {
      const canvas = Graph.renderer().domElement;
      let pointerStart = null;
      let dragCandidate = false;

      canvas.addEventListener("pointerdown", (event) => {
        if (event.button !== 0) return;
        pointerStart = { x: event.clientX, y: event.clientY };
        dragCandidate = Boolean(pickNodeAt(event.clientX, event.clientY));
      });

      canvas.addEventListener("pointerup", (event) => {
        if (event.button !== 0 || !pointerStart) return;
        const dx = event.clientX - pointerStart.x;
        const dy = event.clientY - pointerStart.y;
        const moved = Math.hypot(dx, dy);
        pointerStart = null;

        if (moved > 10) return;

        const node = pickNodeAt(event.clientX, event.clientY);
        if (node) {
          activateNode(node);
        } else if (!dragCandidate) {
          clearSelection();
        }
        dragCandidate = false;
      });
    }

    let isDraggingNode = false;
    let suppressNodeClick = false;

    function releaseDragPin(node) {
      delete node.fx;
      delete node.fy;
      delete node.fz;
    }

    let currentLayoutSpread = 58;

    function configureLayoutForces(data) {
      currentLayoutSpread = layoutSpread(data);
      Graph.d3Force("link").distance(currentLayoutSpread * 1.18).strength(0.14);
      Graph.d3Force("charge").strength(-currentLayoutSpread * 3.4);
      const centerForce = Graph.d3Force("center");
      if (centerForce?.strength) {
        centerForce.strength(0.022);
      }
    }

    const Graph = ForceGraph3D()(document.getElementById("graph"))
      .backgroundColor("#000000")
      .showNavInfo(false)
      .nodeLabel((node) => node.name)
      .nodeVal((node) => nodeSize(node) * 1.2)
      .nodeColor(nodeColor)
      .nodeThreeObject(makeNodeSprite)
      .linkThreeObject(makeLinkObject)
      .linkPositionUpdate(updateLinkObject)
      .linkDirectionalParticles(0)
      .d3VelocityDecay(0.2)
      .d3AlphaDecay(0.008)
      .cooldownTicks(1200)
      .enableNodeDrag(true)
      .onNodeClick((node) => {
        if (!suppressNodeClick) activateNode(node);
      })
      .onNodeDrag(() => {
        isDraggingNode = true;
        suppressNodeClick = true;
        Graph.d3ReheatSimulation();
      })
      .onNodeDragEnd((node) => {
        isDraggingNode = false;
        releaseDragPin(node);
        Graph.d3ReheatSimulation();
        requestAnimationFrame(() => {
          suppressNodeClick = false;
        });
      })
      .onBackgroundClick(clearSelection);

    wireGraphSelection();

    Graph.onEngineStop(finalizeLayout);
    Graph.onEngineTick(() => {
      if (!orphansLaidOut && Graph.d3Alpha() < 0.02) {
        finalizeLayout();
      }
    });

    function refreshGraph() {
      orphansLaidOut = false;
      const data = filteredData();
      data.nodes.forEach((node) => {
        delete node.fx;
        delete node.fy;
        delete node.fz;
      });
      updateStats(data);
      pruneHtmlLabels(data.nodes);
      seedMindMapPositions(data.nodes, data.links);
      seedOrphanPositions(data.nodes, data.links);
      Graph.graphData(data);
      configureLayoutForces(data);
      Graph.d3ReheatSimulation();
      repaintGraph();
    }

    (function renderLoop() {
      if (isDraggingNode && typeof Graph.tickFrame === "function") {
        Graph.tickFrame();
      }
      syncSpritePositions();
      syncLinkPositions();
      updateAllSprites();
      syncHtmlLabels();
      Graph.controls().update();
      Graph.renderer().render(Graph.scene(), Graph.camera());
      requestAnimationFrame(renderLoop);
    })();

    searchInput.addEventListener("input", () => {
      cameraFitted = false;
      refreshGraph();
    });
    toggleOrphans.addEventListener("change", () => {
      cameraFitted = false;
      refreshGraph();
    });
    toggleLearnedOnly.addEventListener("change", () => {
      cameraFitted = false;
      refreshGraph();
    });
    toggleHideNames.addEventListener("change", () => {
      syncHtmlLabels();
    });

    refreshGraph();
    setTimeout(finalizeLayout, 3000);
  </script>
</body>
</html>
